<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 16 16" role="img" aria-label="Pixel robot">
  <rect width="16" height="16" fill="none"/>
  <!-- outline -->
  <g fill="#1a0a0d">
    <rect x="4" y="1" width="8" height="1"/>
    <rect x="3" y="2" width="1" height="1"/>
    <rect x="12" y="2" width="1" height="1"/>
    <rect x="3" y="8" width="1" height="1"/>
    <rect x="12" y="8" width="1" height="1"/>
    <rect x="2" y="9" width="1" height="1"/>
    <rect x="13" y="9" width="1" height="1"/>
    <rect x="2" y="14" width="1" height="1"/>
    <rect x="13" y="14" width="1" height="1"/>
    <rect x="3" y="15" width="4" height="1"/>
    <rect x="9" y="15" width="4" height="1"/>
  </g>

  <!-- head -->
  <g fill="#52525b">
    <rect x="4" y="2" width="8" height="1"/>
    <rect x="4" y="3" width="8" height="1"/>
    <rect x="4" y="4" width="8" height="1"/>
    <rect x="4" y="5" width="8" height="1"/>
    <rect x="4" y="6" width="8" height="1"/>
    <rect x="4" y="7" width="8" height="1"/>
  </g>

  <!-- antenna -->
  <g fill="#ff5c5c">
    <rect x="7" y="0" width="2" height="1"/>
    <rect x="7" y="1" width="2" height="1"/>
  </g>

  <!-- eyes (deadpan) -->
  <g fill="#ff5c5c">
    <rect x="5" y="4" width="2" height="2"/>
    <rect x="9" y="4" width="2" height="2"/>
  </g>
  <!-- eye glint -->
  <g fill="#ffffff">
    <rect x="5" y="4" width="1" height="1"/>
    <rect x="9" y="4" width="1" height="1"/>
  </g>
  <!-- pupils -->
  <g fill="#0e1017">
    <rect x="6" y="5" width="1" height="1"/>
    <rect x="10" y="5" width="1" height="1"/>
  </g>

  <!-- mouth (deadpan line) -->
  <g fill="#3f3f46">
    <rect x="6" y="7" width="4" height="1"/>
  </g>

  <!-- body -->
  <g fill="#71717a">
    <rect x="3" y="9" width="10" height="1"/>
    <rect x="3" y="10" width="10" height="1"/>
    <rect x="3" y="11" width="10" height="1"/>
    <rect x="3" y="12" width="10" height="1"/>
    <rect x="3" y="13" width="10" height="1"/>
  </g>

  <!-- chest panel -->
  <g fill="#ff5c5c">
    <rect x="6" y="10" width="4" height="3"/>
  </g>
  <!-- chest detail -->
  <g fill="#ff7e6b">
    <rect x="7" y="11" width="2" height="1"/>
  </g>

  <!-- legs -->
  <g fill="#52525b">
    <rect x="3" y="14" width="4" height="1"/>
    <rect x="9" y="14" width="4" height="1"/>
  </g>

  <!-- arms (side blocks) -->
  <g fill="#52525b">
    <rect x="1" y="10" width="2" height="3"/>
    <rect x="13" y="10" width="2" height="3"/>
  </g>
</svg>
