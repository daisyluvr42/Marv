services:
  - type: web
    name: marv
    runtime: docker
    plan: starter
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: "8080"
      - key: SETUP_PASSWORD
        sync: false
      - key: MARV_STATE_DIR
        value: /data/.marv
      - key: MARV_WORKSPACE_DIR
        value: /data/workspace
      - key: MARV_GATEWAY_TOKEN
        generateValue: true
    disk:
      name: marv-data
      mountPath: /data
      sizeGB: 1
