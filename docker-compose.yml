services:
  marv-gateway:
    image: ${MARV_IMAGE:-marv:local}
    environment:
      HOME: /home/node
      TERM: xterm-256color
      MARV_GATEWAY_TOKEN: ${MARV_GATEWAY_TOKEN}
      CLAUDE_AI_SESSION_KEY: ${CLAUDE_AI_SESSION_KEY}
      CLAUDE_WEB_SESSION_KEY: ${CLAUDE_WEB_SESSION_KEY}
      CLAUDE_WEB_COOKIE: ${CLAUDE_WEB_COOKIE}
    volumes:
      - ${MARV_CONFIG_DIR}:/home/node/.marv
      - ${MARV_WORKSPACE_DIR}:/home/node/.marv/workspace
    ports:
      - "${MARV_GATEWAY_PORT:-4242}:4242"
      - "${MARV_BRIDGE_PORT:-4243}:4243"
    init: true
    restart: unless-stopped
    command:
      ["node", "dist/index.js", "gateway", "--bind", "${MARV_GATEWAY_BIND:-lan}", "--port", "4242"]

  marv-cli:
    image: ${MARV_IMAGE:-marv:local}
    environment:
      HOME: /home/node
      TERM: xterm-256color
      MARV_GATEWAY_TOKEN: ${MARV_GATEWAY_TOKEN}
      BROWSER: echo
      CLAUDE_AI_SESSION_KEY: ${CLAUDE_AI_SESSION_KEY}
      CLAUDE_WEB_SESSION_KEY: ${CLAUDE_WEB_SESSION_KEY}
      CLAUDE_WEB_COOKIE: ${CLAUDE_WEB_COOKIE}
    volumes:
      - ${MARV_CONFIG_DIR}:/home/node/.marv
      - ${MARV_WORKSPACE_DIR}:/home/node/.marv/workspace
    stdin_open: true
    tty: true
    init: true
    entrypoint: ["node", "dist/index.js"]
